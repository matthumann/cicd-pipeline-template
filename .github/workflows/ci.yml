# GitHub Actions mirror of the GitLab pipeline (.gitlab-ci.yml).
# Kept deliberately parallel so the same branch-aware model renders natively on
# GitHub with a live status badge. GitLab is the primary/reference pipeline.
name: CI/CD

on:
  push:
    branches: [main, dev, "feature/**", "bugfix/**", "hotfix/**", "release/**"]
  pull_request:
    branches: [main, dev]

jobs:
  # --- VALIDATE -------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt ruff
      - run: ruff check src tests

  # --- TEST -----------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest --cov=src --cov-report=term --junitxml=report.xml

  # --- BUILD ----------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Package artifact
        run: tar -czf "app-${GITHUB_SHA::7}.tar.gz" src/ requirements.txt
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: app-*.tar.gz
          retention-days: 7

  # --- DEPLOY (dev: auto on dev branch) -------------------------------------
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
      url: https://dev.example.com
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/deploy.sh dev "app-${GITHUB_SHA::7}.tar.gz"

  # --- DEPLOY (prod: main, gated by GitHub Environment protection rules) -----
  # Add required reviewers to the 'prod' environment in repo Settings to turn
  # this into a manual approval gate — the GitHub equivalent of the GitLab
  # `when: manual` SOX release step.
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod
      url: https://www.example.com
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/deploy.sh prod "app-${GITHUB_SHA::7}.tar.gz"
